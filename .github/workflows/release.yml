# ──────────────────────────────────────────────────────────────
# Automated release pipeline
# Trigger: push a version tag (e.g. v0.1.0)
# Flow: validate tag → build 9 platforms → publish Release
# Artifacts: raw binaries (not tar.gz), with checksums.txt
# ──────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_DIR: cli
  BIN_NAME: onchainos

jobs:
  # ── Step 1: Validate tag matches Cargo.toml version ──────────
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      tag: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          VER=$(grep '^version' ${{ env.CARGO_DIR }}/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "value=$VER" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches Cargo.toml version
        run: |
          TAG="${{ github.ref_name }}"
          VER="v${{ steps.version.outputs.value }}"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag ($TAG) does not match Cargo.toml version ($VER). Please update Cargo.toml first."
            exit 1
          fi

  # ── Step 2: Build raw binaries for 9 platforms in parallel ──────────
  build:
    needs: meta
    runs-on: ${{ matrix.os }}
    env:
      SM_API_KEY: ${{ secrets.SM_API_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS (Apple Silicon + Intel) ──
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          # ── Linux (x64 native, others via cross-compilation) ──
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: i686-unknown-linux-gnu, os: ubuntu-latest, cross: true }
          - {
              target: aarch64-unknown-linux-gnu,
              os: ubuntu-latest,
              cross: true,
            }
          - {
              target: armv7-unknown-linux-gnueabihf,
              os: ubuntu-latest,
              cross: true,
            }
          # ── Windows (x64 / x86 / ARM64) ──
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
          - { target: i686-pc-windows-msvc, os: windows-latest }
          - { target: aarch64-pc-windows-msvc, os: windows-latest }

    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.CARGO_DIR }}
          key: ${{ matrix.target }}

      - name: "Install cross (Linux cross-compilation tool)"
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        working-directory: ${{ env.CARGO_DIR }}
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: "Prepare artifact (Unix: strip symbols + rename)"
        if: runner.os != 'Windows'
        shell: bash
        run: |
          src="${{ env.CARGO_DIR }}/target/${{ matrix.target }}/release/${{ env.BIN_NAME }}"
          if [ "${{ matrix.cross }}" != "true" ]; then
            strip "$src" 2>/dev/null || true
          fi
          cp "$src" "${{ env.BIN_NAME }}-${{ matrix.target }}"
          chmod +x "${{ env.BIN_NAME }}-${{ matrix.target }}"

      - name: "Prepare artifact (Windows: rename .exe)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "${{ env.CARGO_DIR }}\target\${{ matrix.target }}\release\${{ env.BIN_NAME }}.exe" `
                    "${{ env.BIN_NAME }}-${{ matrix.target }}.exe"

      - name: "Setup DigiCert certificate"
        if: runner.os == 'Windows' && env.SM_API_KEY != ''
        shell: bash
        run: |
          echo "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 --decode > "${RUNNER_TEMP}/Certificate_pkcs12.p12"
          echo "SM_HOST=https://one.digicert.com" >> "$GITHUB_ENV"
          echo "SM_CLIENT_CERT_FILE=${RUNNER_TEMP}/Certificate_pkcs12.p12" >> "$GITHUB_ENV"
          echo "SM_CLIENT_CERT_PASSWORD=${{ secrets.SM_CLIENT_CERT_PASSWORD }}" >> "$GITHUB_ENV"
          echo "SM_CODE_SIGNING_CERT_SHA1_HASH=${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}" >> "$GITHUB_ENV"

      - name: "Install smctl and verify credentials"
        if: runner.os == 'Windows' && env.SM_API_KEY != ''
        uses: digicert/code-signing-software-trust-action@v1
        with:
          simple-signing-mode: true

      - name: "Debug: verify smctl can authenticate"
        if: runner.os == 'Windows' && env.SM_API_KEY != ''
        shell: bash
        run: |
          echo "=== Certificate file check ==="
          ls -la "${SM_CLIENT_CERT_FILE}" || echo "CERT FILE NOT FOUND!"
          file "${SM_CLIENT_CERT_FILE}" || true
          echo "=== smctl healthcheck ==="
          smctl healthcheck
          echo "=== smctl keypair list ==="
          smctl keypair ls || true

      - name: "Sign Windows binary (DigiCert KeyLocker)"
        if: runner.os == 'Windows' && env.SM_API_KEY != ''
        shell: bash
        run: |
          smctl sign --keypair-alias "${{ secrets.SM_KEYPAIR_ALIAS }}" --input "${{ env.BIN_NAME }}-${{ matrix.target }}.exe" --exit-non-zero-on-fail --failfast

      - name: "Verify Windows binary signature"
        if: runner.os == 'Windows' && env.SM_API_KEY != ''
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "${{ env.BIN_NAME }}-${{ matrix.target }}.exe"
          Write-Host "Signature status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') {
            Write-Host "::warning::Code signing verification failed with status: $($sig.Status)"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: ${{ env.BIN_NAME }}-${{ matrix.target }}*

  # ── Step 3: Create GitHub Release ──────────────────────────────
  release:
    needs: [meta, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate SHA256 checksum file
        run: sha256sum ${{ env.BIN_NAME }}-* > checksums.txt

      - name: List all release artifacts
        run: ls -lh && echo "---" && cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ env.BIN_NAME }}-*
            checksums.txt
