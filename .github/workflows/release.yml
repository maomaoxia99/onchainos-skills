# ──────────────────────────────────────────────────────────────
# DEBUG: Windows signing test only (temporary)
# Using jsign instead of smctl (smctl has p12 parsing bug)
# ──────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BIN_NAME: onchainos

jobs:
  sign-test:
    runs-on: windows-latest
    env:
      SM_API_KEY: ${{ secrets.SM_API_KEY }}

    steps:
      - name: "Create dummy exe"
        shell: pwsh
        run: |
          Copy-Item "C:\Windows\System32\cmd.exe" "$PWD\${{ env.BIN_NAME }}-test.exe"

      - name: "Setup DigiCert certificate"
        env:
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
        shell: pwsh
        run: |
          $certPath = "${{ runner.temp }}\Certificate_pkcs12.p12"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:SM_CLIENT_CERT_FILE_B64))
          Write-Host "Certificate size: $((Get-Item $certPath).Length) bytes"
          "SM_CLIENT_CERT_FILE=$certPath" >> $env:GITHUB_ENV

      - name: "Download jsign"
        shell: pwsh
        run: |
          $jsignUrl = "https://github.com/ebourg/jsign/releases/download/7.0/jsign-7.0.jar"
          Invoke-WebRequest -Uri $jsignUrl -OutFile "${{ runner.temp }}\jsign.jar"
          Write-Host "jsign downloaded: $((Get-Item "${{ runner.temp }}\jsign.jar").Length) bytes"

      - name: "Sign with jsign (DigiCert ONE)"
        shell: pwsh
        run: |
          $certFile = $env:SM_CLIENT_CERT_FILE
          $certPassword = "${{ secrets.SM_CLIENT_CERT_PASSWORD }}"
          $apiKey = $env:SM_API_KEY
          $keypairAlias = "${{ secrets.SM_KEYPAIR_ALIAS }}"
          $jsign = "${{ runner.temp }}\jsign.jar"

          # jsign DigiCert ONE format: apikey|certfile|certpassword
          $storepass = "${apiKey}|${certFile}|${certPassword}"

          Write-Host "Signing with jsign..."
          java -jar $jsign `
            --storetype DIGICERTONE `
            --storepass $storepass `
            --alias $keypairAlias `
            --tsaurl "http://timestamp.digicert.com" `
            "${{ env.BIN_NAME }}-test.exe" 2>&1

          Write-Host "Exit code: $LASTEXITCODE"

      - name: "Verify signature"
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "${{ env.BIN_NAME }}-test.exe"
          Write-Host "Status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          Write-Host "Timestamp: $($sig.TimeStamperCertificate.Subject)"
