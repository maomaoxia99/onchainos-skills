# ──────────────────────────────────────────────────────────────
# DEBUG: Windows signing test only (temporary)
# ──────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BIN_NAME: onchainos

jobs:
  sign-test:
    runs-on: windows-latest
    env:
      SM_API_KEY: ${{ secrets.SM_API_KEY }}
      SM_HOST: https://one.digicert.com
      SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
      SM_CODE_SIGNING_CERT_SHA1_HASH: ${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}

    steps:
      - name: "Create dummy exe"
        shell: pwsh
        run: |
          Copy-Item "C:\Windows\System32\cmd.exe" "$PWD\${{ env.BIN_NAME }}-test.exe"

      - name: "Setup DigiCert certificate"
        env:
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
        shell: pwsh
        run: |
          $certPath = "${{ runner.temp }}\Certificate_pkcs12.p12"
          $openssl = "C:\Program Files\Git\usr\bin\openssl.exe"
          $password = $env:SM_CLIENT_CERT_PASSWORD

          # Decode original p12
          $originalP12 = "${{ runner.temp }}\cert_original.p12"
          [IO.File]::WriteAllBytes($originalP12, [Convert]::FromBase64String($env:SM_CLIENT_CERT_FILE_B64))

          # Convert to legacy 3DES format via openssl
          $pemFile = "${{ runner.temp }}\cert_temp.pem"
          & $openssl pkcs12 -in $originalP12 -out $pemFile -nodes -passin "pass:$password"
          & $openssl pkcs12 -export -in $pemFile -out $certPath -passout "pass:$password" -certpbe PBE-SHA1-3DES -keypbe PBE-SHA1-3DES -macalg SHA1

          Write-Host "Legacy p12 size: $((Get-Item $certPath).Length) bytes"
          Remove-Item $originalP12, $pemFile -ErrorAction SilentlyContinue

          # Set ONLY the cert file path via GITHUB_ENV (password already in job env)
          "SM_CLIENT_CERT_FILE=$certPath" >> $env:GITHUB_ENV

      - name: "Install smctl"
        uses: digicert/code-signing-software-trust-action@v1
        with:
          simple-signing-mode: true

      - name: "Verify and sign"
        shell: pwsh
        run: |
          Write-Host "=== Env check ==="
          Write-Host "SM_HOST: $env:SM_HOST"
          Write-Host "SM_CLIENT_CERT_FILE: $env:SM_CLIENT_CERT_FILE"
          Write-Host "SM_API_KEY length: $($env:SM_API_KEY.Length)"
          Write-Host "SM_CLIENT_CERT_PASSWORD length: $($env:SM_CLIENT_CERT_PASSWORD.Length)"
          Write-Host "Cert file size: $((Get-Item $env:SM_CLIENT_CERT_FILE).Length) bytes"

          Write-Host "`n=== Healthcheck ==="
          smctl healthcheck

          Write-Host "`n=== Sign (simple mode) ==="
          smctl sign --simple --keypair-alias "${{ secrets.SM_KEYPAIR_ALIAS }}" --input "${{ env.BIN_NAME }}-test.exe" -v 2>&1

      - name: "Verify signature"
        if: success()
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "${{ env.BIN_NAME }}-test.exe"
          Write-Host "Status: $($sig.Status) Signer: $($sig.SignerCertificate.Subject)"
