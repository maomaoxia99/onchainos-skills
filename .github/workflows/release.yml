# ──────────────────────────────────────────────────────────────
# DEBUG: Windows signing test only (temporary)
# ──────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BIN_NAME: onchainos

jobs:
  sign-test:
    runs-on: windows-latest
    env:
      SM_API_KEY: ${{ secrets.SM_API_KEY }}
      SM_HOST: https://one.digicert.com
      SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
      SM_CODE_SIGNING_CERT_SHA1_HASH: ${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}

    steps:
      - name: "Create dummy exe"
        shell: pwsh
        run: |
          Copy-Item "C:\Windows\System32\cmd.exe" "$PWD\${{ env.BIN_NAME }}-test.exe"

      - name: "Setup DigiCert certificate"
        env:
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
        shell: pwsh
        run: |
          $openssl = "C:\Program Files\Git\usr\bin\openssl.exe"
          $password = $env:SM_CLIENT_CERT_PASSWORD
          $originalP12 = "${{ runner.temp }}\cert_original.p12"

          # Decode original p12
          [IO.File]::WriteAllBytes($originalP12, [Convert]::FromBase64String($env:SM_CLIENT_CERT_FILE_B64))

          # Approach 1: PEM format (cert + key in one file)
          $pemFile = "${{ runner.temp }}\Certificate.pem"
          & $openssl pkcs12 -in $originalP12 -out $pemFile -nodes -passin "pass:$password" 2>&1
          Write-Host "PEM file size: $((Get-Item $pemFile).Length) bytes"

          # Approach 2: Also keep a legacy p12 as fallback
          $legacyP12 = "${{ runner.temp }}\Certificate_pkcs12.p12"
          & $openssl pkcs12 -export -in $pemFile -out $legacyP12 -passout "pass:$password" -certpbe PBE-SHA1-3DES -keypbe PBE-SHA1-3DES -macalg SHA1 2>&1
          Write-Host "Legacy p12 size: $((Get-Item $legacyP12).Length) bytes"

          Remove-Item $originalP12 -ErrorAction SilentlyContinue

          # Try PEM first - smctl might support it
          "SM_CLIENT_CERT_FILE=$pemFile" >> $env:GITHUB_ENV

      - name: "Install smctl"
        uses: digicert/code-signing-software-trust-action@v1
        with:
          simple-signing-mode: true

      - name: "Verify and sign"
        shell: pwsh
        run: |
          $pemFile = "${{ runner.temp }}\Certificate.pem"
          $legacyP12 = "${{ runner.temp }}\Certificate_pkcs12.p12"

          Write-Host "=== Test 1: PEM format ==="
          $env:SM_CLIENT_CERT_FILE = $pemFile
          Write-Host "SM_CLIENT_CERT_FILE = $env:SM_CLIENT_CERT_FILE"
          smctl healthcheck 2>&1 | Select-String "Authentication"

          Write-Host "`n=== Test 2: Legacy P12 format ==="
          $env:SM_CLIENT_CERT_FILE = $legacyP12
          Write-Host "SM_CLIENT_CERT_FILE = $env:SM_CLIENT_CERT_FILE"
          smctl healthcheck 2>&1 | Select-String "Authentication"

          Write-Host "`n=== Test 3: Original P12 (no password env, use saved creds) ==="
          smctl credentials save $env:SM_API_KEY $env:SM_CLIENT_CERT_PASSWORD 2>&1
          $env:SM_CLIENT_CERT_PASSWORD = ""
          smctl healthcheck 2>&1 | Select-String "Authentication"

          # Use whichever format shows 2FA, default to PEM
          $env:SM_CLIENT_CERT_FILE = $pemFile
          $env:SM_CLIENT_CERT_PASSWORD = "${{ secrets.SM_CLIENT_CERT_PASSWORD }}"

          Write-Host "`n=== Sign attempt ==="
          smctl sign --simple --keypair-alias "${{ secrets.SM_KEYPAIR_ALIAS }}" --input "${{ env.BIN_NAME }}-test.exe" -v 2>&1

      - name: "Verify signature"
        if: success()
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "${{ env.BIN_NAME }}-test.exe"
          Write-Host "Status: $($sig.Status) Signer: $($sig.SignerCertificate.Subject)"
